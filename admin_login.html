<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Admin Login | MindTrack</title>

  <!-- Favicons -->
  <link href="../static/img/favicon.png" rel="icon">
  <link href="../static/img/apple-touch-icon.png" rel="apple-touch-icon">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Poppins:wght@500;600;700&family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Vendor CSS Files -->
  <link href="../static/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../static/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="../static/vendor/aos/aos.css" rel="stylesheet">

  <!-- Main CSS File -->
  <link href="../static/css/main.css" rel="stylesheet">

  <style>
    .login-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('../static/img/hero-bg.jpg');
      background-size: cover;
      background-position: center;
    }

    .login-card {
      background: rgba(0,0,0,0.9);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
      max-width: 420px;
      width: 100%;
      color: #fff;
    }

    .login-card h2 {
      text-align: center;
      margin-bottom: 25px;
      font-weight: 600;
    }

    label {
      margin-bottom: 5px;
      font-weight: 500;
    }

    .form-control {
      background: #111;
      border: 1px solid #444;
      padding: 12px;
      color: #fff;
    }

    .form-control:focus {
      background: #111;
      color: #fff;
      border-color: #0d6efd;
      box-shadow: none;
    }

    .btn-admin {
      background: #0d6efd;
      color: #fff;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 8px;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn-admin:hover {
      background: #0b5ed7;
    }

    .extra-links {
      text-align: center;
      margin-top: 15px;
    }

    .extra-links a {
      color: #0d6efd;
      text-decoration: none;
    }

    .extra-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body class="index-page">

<!-- ======= Header ======= -->
<header id="header" class="header d-flex align-items-center sticky-top">
  <div class="container-fluid container-xl d-flex align-items-center">

    <a href="/" class="logo d-flex align-items-center me-auto">
      <h1 class="sitename">Mind<span>Track</span></h1>
    </a>

    <nav id="navmenu" class="navmenu">
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/admin_login" class="active">Admin</a></li>
        <li><a href="/teacher_login">Teacher</a></li>
        <li><a href="/parent_login">Parent</a></li>
      </ul>
      <i class="mobile-nav-toggle d-xl-none bi bi-list"></i>
    </nav>

  </div>
</header>
<!-- End Header -->


<!-- ======= Login Section ======= -->
<section class="login-section">

  <div class="login-card" data-aos="zoom-in">
    <h2 style="color:white"><i class="bi bi-shield-lock-fill" style="color:white"></i> Admin Login</h2>

    <form method="POST">

      <div class="mb-3">
        <label>Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
      </div>

      <div class="mb-4">
        <label>Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="btn btn-admin">
        <i class="bi bi-box-arrow-in-right"></i> Login
      </button>

      <div class="extra-links">
        <p class="mt-3">
          <a href="{{ url_for('index') }}">Back to Home</a>
        </p>
      </div>

    </form>
  </div>

</section>
<!-- End Login Section -->


<!-- ======= Footer ======= -->
<footer id="footer" class="footer dark-background">
  <div class="container text-center mt-2">
    <p><strong class="sitename"></strong> ADHD & Dyslexia Screening Tool</p>
    <p></p>
  </div>
</footer>
<!-- End Footer -->


<a href="#" id="scroll-top" class="scroll-top d-flex align-items-center justify-content-center">
  <i class="bi bi-arrow-up-short"></i>
</a>

<!-- Vendor JS Files -->
<script src="../static/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="../static/vendor/aos/aos.js"></script>
<script>
  AOS.init();
</script>
<script src="../static/js/main.js"></script>

</body>
</html>
